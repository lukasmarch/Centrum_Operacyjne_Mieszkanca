    <style>
        /* ── style.txt dark theme tokens ───────────────────────── */
        :root {
            --card: #0d1117;
            --ring: #525252;
            --input: #262626;
            --muted: #262626;
            --accent: #262626;
            --border: #262626;
            --chart-1: #91c5ff;
            --chart-2: #3a81f6;
            --chart-3: #2563ef;
            --chart-4: #1a4eda;
            --chart-5: #1f3fad;
            --primary: #fafafa;
            --background: #05080f;
            --foreground: #fafafa;
            --muted-foreground: #a1a1a1;
            --radius: 0.625rem;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #05080f;
        }

        /* ── GlowingTile logic from assets/borders.txt ── */
        @property --glow-angle {
            syntax: "<angle>";
            initial-value: 0deg;
            inherits: false;
        }

        .glow-tile-container {
            position: relative;
            border-radius: 1.25rem; /* 20px */
            padding: 1px; /* inner border thickness */
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease;
            will-change: transform;
            z-index: 1;
        }
        .glow-tile-container:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .glow-tile-layer {
            position: absolute;
            inset: 0;
            border-radius: inherit;
            z-index: -1;
            /* Rotating light beam */
            background: conic-gradient(
                from var(--glow-angle),
                transparent 0%,
                transparent 35%,
                var(--chart-2) 42%,
                var(--chart-1) 48%,
                rgba(255,255,255,0.8) 50%,
                var(--chart-1) 52%,
                var(--chart-2) 58%,
                transparent 65%,
                transparent 100%
            );
            animation: glow-spin 6s linear infinite;
            opacity: 0.15; /* subtle un-hovered state */
            transition: opacity 0.5s ease;
        }

        .glow-tile-container:hover .glow-tile-layer {
            opacity: 1;
            animation: glow-spin 3s linear infinite;
        }

        .glow-tile-content {
            position: relative;
            height: 100%;
            width: 100%;
            border-radius: calc(1.25rem - 1px);
            overflow: hidden;
            z-index: 1;
        }

        @keyframes glow-spin {
            0% { --glow-angle: 0deg; }
            100% { --glow-angle: 360deg; }
        }

        /* ── Hero background Ken Burns effect ── */
        @keyframes hero-ken-burns {
            from { transform: scale(1.00) translate(0%,    0%);   }
            to   { transform: scale(1.07) translate(-1.5%, 0.8%); }
        }
        @media (prefers-reduced-motion: reduce) {
            [style*="hero-ken-burns"] { animation: none !important; }
        }

        /* ── Aurora background blobs ── */
        @keyframes aurora-1 {
            0%,100% { transform: translate3d(0,    0,   0) scale(1.00); }
            30%      { transform: translate3d(45px,-35px,0) scale(1.06); }
            65%      { transform: translate3d(-25px,28px,0) scale(0.96); }
        }
        @keyframes aurora-2 {
            0%,100% { transform: translate3d(0,    0,   0) scale(1.00); }
            35%      { transform: translate3d(-55px,42px,0) scale(1.07); }
            70%      { transform: translate3d(32px,-22px,0) scale(0.95); }
        }
        @keyframes aurora-3 {
            0%,100% { transform: translate3d(0,   0,  0) scale(1.00); }
            50%      { transform: translate3d(22px,35px,0) scale(1.04); }
        }
        @media (prefers-reduced-motion: reduce) {
            .aurora-blob { animation: none !important; }
        }

        /* ── Base generic styles ── */dark card ──────────────────── */
        .glass-panel {
            background: rgba(10, 10, 10, 0.72);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        /* ── text-gradient: chart-1 → chart-2 (style.txt blues) ── */
        .text-gradient {
            background: linear-gradient(to right, #91c5ff, #3a81f6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .text-gradient-saas {
            background: linear-gradient(to bottom, #fafafa, #a3a3a3);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ── Unified button: primary CTA ───────────────────────── */
        .btn-primary {
            background: var(--chart-2);
            color: #ffffff;
            border: none;
            border-radius: 0.75rem;
            padding: 0.75rem 1.25rem;
            font-weight: 700;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        .btn-primary:hover {
            background: var(--chart-1);
            transform: scale(1.05);
        }
        .btn-primary:active {
            transform: scale(0.95);
        }

        /* ── Unified button: chip / pill ───────────────────────── */
        .btn-chip {
            font-size: 0.75rem;
            border-radius: 9999px;
            padding: 0.375rem 0.75rem;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--muted-foreground);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        .btn-chip:hover {
            background: rgba(58,129,246,0.12);
            border-color: rgba(58,129,246,0.35);
            color: var(--chart-1);
        }

        /* ── Spotlight animation ────────────────────────────────── */
        @keyframes spotlight {
            0%   { opacity: 0; transform: translate(-72%, -62%) scale(0.5); }
            100% { opacity: 1; transform: translate(-50%, -40%) scale(1); }
        }
        .animate-spotlight { animation: spotlight 2s ease 0.75s 1 forwards; }

        /* ── No-scrollbar ───────────────────────────────────────── */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* ── Custom Scrollbar ───────────────────────────────────── */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #374151; }

        /* ── borders.txt: GlowingShadow CSS properties ─────────── */
        @property --hue          { syntax: "<number>"; inherits: true; initial-value: 0; }
        @property --rotate       { syntax: "<number>"; inherits: true; initial-value: 0; }
        @property --bg-y         { syntax: "<number>"; inherits: true; initial-value: 0; }
        @property --bg-x         { syntax: "<number>"; inherits: true; initial-value: 0; }
        @property --glow-translate-y { syntax: "<number>"; inherits: true; initial-value: 0; }
        @property --bg-size      { syntax: "<number>"; inherits: true; initial-value: 0; }
        @property --glow-opacity { syntax: "<number>"; inherits: true; initial-value: 0; }
        @property --glow-blur    { syntax: "<number>"; inherits: true; initial-value: 0; }
        @property --glow-scale   { syntax: "<number>"; inherits: true; initial-value: 2; }
        @property --glow-radius  { syntax: "<number>"; inherits: true; initial-value: 2; }
        @property --white-shadow { syntax: "<number>"; inherits: true; initial-value: 0; }

        .glow-container {
            --card-color: hsl(260deg 100% 3%);
            --text-color: hsl(260deg 10% 55%);
            --card-radius: 3.6vw;
            --card-width: 35vw;
            --border-width: 3px;
            --bg-size: 1;
            --hue: 0;
            --hue-speed: 1;
            --rotate: 0;
            --animation-speed: 4s;
            --interaction-speed: 0.55s;
            --glow-scale: 1.5;
            --scale-factor: 1;
            --glow-blur: 6;
            --glow-opacity: 1;
            --glow-radius: 100;
            --glow-rotate-unit: 1deg;
            width: var(--card-width);
            width: min(480px, var(--card-width));
            aspect-ratio: 1.5/1;
            color: white;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
            border-radius: var(--card-radius);
            cursor: pointer;
        }
        .glow-container:before,.glow-container:after {
            content: "";display: block;position: absolute;
            width: 100%;height: 100%;border-radius: var(--card-radius);
        }
        .glow-content {
            position: absolute;background: var(--card-color);
            border-radius: calc(var(--card-radius) * 0.9);
            display: flex;align-items: center;justify-content: center;
            padding: calc(var(--card-width) / 8);
        }
        .glow-content:before {
            content: "";display: block;position: absolute;
            width: calc(100% + var(--border-width));
            height: calc(100% + var(--border-width));
            border-radius: calc(var(--card-radius) * 0.9);
            box-shadow: 0 0 20px black;mix-blend-mode: color-burn;z-index: -1;
            background: hsl(0deg 0% 16%) radial-gradient(
                30% 30% at calc(var(--bg-x) * 1%) calc(var(--bg-y) * 1%),
                hsl(calc(var(--hue) * var(--hue-speed) * 1deg) 100% 90%) calc(0% * var(--bg-size)),
                hsl(calc(var(--hue) * var(--hue-speed) * 1deg) 100% 80%) calc(20% * var(--bg-size)),
                hsl(calc(var(--hue) * var(--hue-speed) * 1deg) 100% 60%) calc(40% * var(--bg-size)),
                transparent 100%
            );
            animation: hue-animation var(--animation-speed) linear infinite,
                       rotate-bg var(--animation-speed) linear infinite;
            transition: --bg-size var(--interaction-speed) ease;
        }
        .glow { --glow-translate-y: 0;display: block;position: absolute;
            width: calc(var(--card-width) / 5);height: calc(var(--card-width) / 5);
            animation: rotate var(--animation-speed) linear infinite;
            transform: rotateZ(calc(var(--rotate) * var(--glow-rotate-unit)));
            transform-origin: center;border-radius: calc(var(--glow-radius) * 10vw);
        }
        .glow:after {
            content: "";display: block;z-index: -2;
            filter: blur(calc(var(--glow-blur) * 10px));
            width: 130%;height: 130%;left: -15%;top: -15%;
            background: hsl(calc(var(--hue) * var(--hue-speed) * 1deg) 100% 60%);
            position: relative;border-radius: calc(var(--glow-radius) * 10vw);
            animation: hue-animation var(--animation-speed) linear infinite;
            transform: scaleY(calc(var(--glow-scale) * var(--scale-factor) / 1.1))
                       scaleX(calc(var(--glow-scale) * var(--scale-factor) * 1.2))
                       translateY(calc(var(--glow-translate-y) * 1%));
            opacity: var(--glow-opacity);
        }
        .glow-container:hover .glow-content {
            mix-blend-mode: darken;--text-color: white;
            box-shadow: 0 0 calc(var(--white-shadow) * 1vw) calc(var(--white-shadow) * 0.15vw) rgb(255 255 255 / 20%);
            animation: shadow-pulse calc(var(--animation-speed) * 2) linear infinite;
        }
        .glow-container:hover .glow-content:before { --bg-size: 15; animation-play-state: paused; }
        .glow-container:hover .glow {
            --glow-blur: 1.5;--glow-opacity: 0.6;--glow-scale: 2.5;
            --glow-radius: 0;--rotate: 900;--glow-rotate-unit: 0;--scale-factor: 1.25;
            animation-play-state: paused;
        }
        .glow-container:hover .glow:after {
            --glow-translate-y: 0;animation-play-state: paused;
            transition: --glow-translate-y 0s ease, --glow-blur 0.05s ease,
                        --glow-opacity 0.05s ease, --glow-scale 0.05s ease, --glow-radius 0.05s ease;
        }
        @keyframes shadow-pulse {
            0%,24%,46%,73%,96% { --white-shadow: 0.5; }
            12%,28%,41%,63%,75%,82%,98% { --white-shadow: 2.5; }
            6%,32%,57% { --white-shadow: 1.3; }
            18%,52%,88% { --white-shadow: 3.5; }
        }
        @keyframes rotate-bg {
            0%   { --bg-x: 0;   --bg-y: 0;   }
            25%  { --bg-x: 100; --bg-y: 0;   }
            50%  { --bg-x: 100; --bg-y: 100; }
            75%  { --bg-x: 0;   --bg-y: 100; }
            100% { --bg-x: 0;   --bg-y: 0;   }
        }
        @keyframes rotate {
            from { --rotate: -70; --glow-translate-y: -65; }
            to   { --rotate: calc(360 - 70); --glow-translate-y: -65; }
        }
        @keyframes hue-animation {
            0%   { --hue: 0;   }
            100% { --hue: 360; }
        }
    </style>
