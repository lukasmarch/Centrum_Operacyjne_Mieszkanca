<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gmina Rybno - Centrum Operacyjne</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">

    <!-- Charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar glass-panel">
            <div class="logo">
                <i class="fa-solid fa-seedling"></i>
                <span>Gmina Rybno</span>
            </div>

            <ul class="nav-links">
                <li class="active" data-tab="overview">
                    <i class="fa-solid fa-chart-pie"></i>
                    <span>Przegląd</span>
                </li>
                <li data-tab="demographics">
                    <i class="fa-solid fa-users"></i>
                    <span>Ludność</span>
                </li>
                <li data-tab="finance">
                    <i class="fa-solid fa-coins"></i>
                    <span>Finanse</span>
                </li>
                <li data-tab="infrastructure">
                    <i class="fa-solid fa-city"></i>
                    <span>Mienie</span>
                </li>
                <li data-tab="labor">
                    <i class="fa-solid fa-briefcase"></i>
                    <span>Praca</span>
                </li>
            </ul>

            <div class="sidebar-footer">
                <div class="update-info">
                    <small>Ostatnia aktualizacja:</small>
                    <span id="last-update-date">...</span>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar glass-panel">
                <div class="header-title">
                    <h1 id="page-title">Przegląd Gminy</h1>
                    <p id="page-subtitle">Kluczowe wskaźniki rozwoju i statystyki</p>
                </div>
                <!-- LLM AI Insight Button -->
                <div class="header-actions">
                    <button id="ask-ai-btn" class="ai-button glass-button">
                        <i class="fa-solid fa-wand-magic-sparkles"></i>
                        Analiza AI
                    </button>
                </div>
            </header>

            <div id="content-area">
                <!-- Dynamic Content Loaded via JS -->
                <div class="loading-spinner">
                    <i class="fa-solid fa-circle-notch fa-spin"></i>
                </div>
            </div>
        </main>
    </div>

    <!-- AI Modal -->
    <div id="ai-modal" class="modal">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h2><i class="fa-solid fa-robot"></i> Asystent Analityczny</h2>
                <span class="close-modal">&times;</span>
            </div>
            <div class="modal-body">
                <div id="ai-response-text" class="ai-text">
                    Generowanie analizy...
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
